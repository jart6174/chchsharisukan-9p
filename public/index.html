<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SMJK Chung Hwa Confucian Hari Sukan 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --border: #1e1e2e;
    --accent: #f5c518;
    --text: #e8e8f0;
    --muted: #6b6b8a;
    --gold: #FFD700;
    --silver: #C0C0C0;
    --bronze: #CD7F32;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Outfit', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }
  body::before {
    content:'';
    position:fixed; inset:0;
    background-image:
      linear-gradient(rgba(245,197,24,.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(245,197,24,.03) 1px, transparent 1px);
    background-size: 50px 50px;
    pointer-events:none; z-index:0;
  }
  .container { max-width:1100px; margin:0 auto; padding:0 20px; position:relative; z-index:1; }

  /* ── Top bar ── */
  .topbar {
    position:sticky; top:0; z-index:100;
    background: rgba(10,10,15,.92);
    backdrop-filter: blur(12px);
    border-bottom:1px solid var(--border);
    padding: 10px 20px;
    display:flex; align-items:center; justify-content:space-between;
  }
  .topbar-school {
    font-family:'Bebas Neue', sans-serif;
    font-size:1rem; letter-spacing:2px;
    background: linear-gradient(135deg, #f5c518, #ff9500);
    -webkit-background-clip:text; -webkit-text-fill-color:transparent;
    background-clip:text;
  }
  .lang-toggle {
    display:flex; align-items:center; gap:4px;
    background: var(--surface);
    border:1px solid var(--border);
    border-radius:999px; padding:4px 5px;
  }
  .lang-btn {
    padding:4px 14px; border-radius:999px; border:none;
    cursor:pointer; font-family:'Outfit', sans-serif;
    font-size:.78rem; font-weight:700; letter-spacing:1px;
    transition: all .2s;
    background:transparent; color:var(--muted);
  }
  .lang-btn.active { background:var(--accent); color:#000; }

  /* ── Header ── */
  header {
    padding: 50px 0 20px;
    text-align: center;
  }
  .school-name {
    font-family:'Bebas Neue', sans-serif;
    font-size: clamp(1rem, 3vw, 1.5rem);
    letter-spacing: 4px;
    color: var(--muted);
    margin-bottom: 6px;
  }
  header h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(2.8rem, 7vw, 5.5rem);
    letter-spacing: 5px;
    background: linear-gradient(135deg, #f5c518, #ff9500);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1;
    margin-bottom: 10px;
  }
  .year-badge {
    display:inline-block;
    background: rgba(245,197,24,.1);
    border:1px solid rgba(245,197,24,.25);
    color: var(--accent);
    font-family:'Bebas Neue', sans-serif;
    font-size:1.3rem; letter-spacing:4px;
    padding:4px 20px; border-radius:999px;
  }

  /* ── Last updated indicator ── */
  .updated-strip {
    text-align:center;
    margin-top:18px;
    display:flex; align-items:center; justify-content:center; gap:8px;
    font-size:.75rem; color:var(--muted);
  }
  .updated-dot {
    width:7px; height:7px; border-radius:50%;
    background: var(--gold);
    box-shadow: 0 0 8px rgba(255,215,0,.6);
    animation: pulse-dot 2s infinite;
  }
  @keyframes pulse-dot { 0%,100% { opacity:1; } 50% { opacity:.35; } }

  /* ── PODIUM ── */
  .podium-section { padding: 30px 0 20px; }
  .section-label {
    text-align:center;
    font-size:.72rem; letter-spacing:3px; text-transform:uppercase;
    color:var(--muted); margin-bottom:36px;
    font-family:'Outfit', sans-serif;
  }
  .section-label span { color:var(--accent); font-weight:700; }

  .podium-wrap {
    display:flex;
    align-items:flex-end;
    justify-content:center;
    gap:14px;
    margin-bottom: 44px;
  }

  .podium-card {
    display:flex; flex-direction:column; align-items:center;
  }

  .podium-rank-badge {
    font-family:'Bebas Neue', sans-serif;
    font-size:.95rem; letter-spacing:2px;
    margin-bottom:10px;
    color: var(--muted);
  }
  .podium-card.p1 .podium-rank-badge { color:var(--gold); font-size:1.05rem; }
  .podium-card.p2 .podium-rank-badge { color:var(--silver); }
  .podium-card.p3 .podium-rank-badge { color:var(--bronze); }

  .podium-info {
    background: var(--surface);
    border:2px solid var(--border);
    border-radius:16px;
    padding:20px 16px 16px;
    text-align:center;
    position:relative; overflow:hidden;
    transition: transform .2s;
    width: 190px;
  }
  .podium-info:hover { transform: translateY(-4px); }

  .podium-card.p1 .podium-info {
    border-color: var(--gold);
    box-shadow: 0 0 40px rgba(255,215,0,.18), 0 0 80px rgba(255,215,0,.06);
    width: 220px;
  }
  .podium-card.p2 .podium-info {
    border-color: var(--silver);
    box-shadow: 0 0 20px rgba(192,192,192,.12);
    width: 195px;
  }
  .podium-card.p3 .podium-info {
    border-color: var(--bronze);
    box-shadow: 0 0 20px rgba(205,127,50,.1);
    width: 178px;
  }
  .podium-card.p4 .podium-info { width: 160px; }

  .podium-info::before {
    content:''; position:absolute; top:0; left:0; right:0; height:3px;
  }
  .podium-card.p1 .podium-info::before { background:linear-gradient(90deg,#FFD700,#FFA500); }
  .podium-card.p2 .podium-info::before { background:linear-gradient(90deg,#C0C0C0,#888); }
  .podium-card.p3 .podium-info::before { background:linear-gradient(90deg,#CD7F32,#8B4513); }
  .podium-card.p4 .podium-info::before { background:var(--border); }

  .podium-medal-icon { font-size:2.4rem; display:block; margin-bottom:8px; }
  .podium-card.p1 .podium-medal-icon { font-size:3rem; }

  .podium-team-dot-big {
    width:16px; height:16px; border-radius:50%;
    margin:0 auto 10px; border:3px solid rgba(255,255,255,.12);
  }
  .podium-card.p1 .podium-team-dot-big { width:20px; height:20px; }

  .podium-team-name {
    font-family:'Bebas Neue', sans-serif;
    letter-spacing:2px; line-height:1.1;
    margin-bottom:12px; font-size:1.05rem;
  }
  .podium-card.p1 .podium-team-name { font-size:1.25rem; }

  .podium-points {
    font-family:'Bebas Neue', sans-serif;
    font-size:2.4rem; color:var(--accent); line-height:1;
  }
  .podium-card.p1 .podium-points { font-size:3rem; }
  .podium-pts-label { font-size:.65rem; letter-spacing:2px; color:var(--muted); text-transform:uppercase; margin-bottom:2px; }

  .podium-medals-row {
    display:flex; justify-content:center; gap:8px;
    margin-top:10px; padding-top:10px;
    border-top:1px solid var(--border);
    font-size:.75rem;
  }
  .podium-medal-count { display:flex; align-items:center; gap:2px; color:var(--muted); }

  .podium-platform {
    width:100%; border-radius:8px 8px 0 0; margin-top:10px;
  }
  .podium-card.p1 .podium-platform { height:64px; background:linear-gradient(180deg,rgba(255,215,0,.2),rgba(255,215,0,.05)); }
  .podium-card.p2 .podium-platform { height:42px; background:linear-gradient(180deg,rgba(192,192,192,.15),rgba(192,192,192,.04)); }
  .podium-card.p3 .podium-platform { height:26px; background:linear-gradient(180deg,rgba(205,127,50,.15),rgba(205,127,50,.04)); }
  .podium-card.p4 .podium-platform { height:12px; background:rgba(255,255,255,.03); }

  /* ── Filter bar ── */
  .filter-section { padding: 36px 0 10px; }
  .filter-bar {
    display:flex; gap:8px; flex-wrap:wrap;
    justify-content: center; margin-bottom:24px;
  }
  .filter-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 8px 20px;
    border-radius: 999px;
    cursor: pointer;
    font-family: 'Outfit', sans-serif;
    font-size: .82rem; letter-spacing: 1px; text-transform: uppercase;
    transition: all .2s;
  }
  .filter-btn:hover, .filter-btn.active {
    background: var(--accent); color: #000;
    border-color: var(--accent); font-weight:700;
  }

  /* ── Standings table ── */
  .standings {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px; overflow: hidden;
    margin-bottom: 28px;
  }
  .standings-header {
    background: linear-gradient(135deg, #1a1a28, #12121f);
    padding: 18px 24px;
    display:flex; align-items:center; justify-content:space-between;
  }
  .standings-header h2 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.4rem; letter-spacing: 3px; color: var(--accent);
  }
  .comp-label { font-size:.72rem; color:var(--muted); letter-spacing:2px; text-transform:uppercase; }
  table { width:100%; border-collapse:collapse; }
  thead th {
    padding: 12px 18px; text-align:left;
    font-size:.68rem; letter-spacing:2px; text-transform:uppercase;
    color:var(--muted); border-bottom: 1px solid var(--border);
    background: rgba(255,255,255,.02);
  }
  thead th.center { text-align:center; }
  tbody tr { border-bottom: 1px solid var(--border); transition: background .15s; }
  tbody tr:last-child { border-bottom:none; }
  tbody tr:hover { background: rgba(255,255,255,.03); }
  tbody td { padding: 14px 18px; }
  .rank { font-family:'Bebas Neue', sans-serif; font-size:1.4rem; color:var(--muted); width:50px; }
  .rank.first  { color:var(--gold); }
  .rank.second { color:var(--silver); }
  .rank.third  { color:var(--bronze); }
  .team-name-cell { display:flex; align-items:center; gap:10px; }
  .team-dot { width:11px; height:11px; border-radius:50%; flex-shrink:0; }
  .team-name { font-weight:600; font-size:.95rem; }
  .medal-cell { text-align:center; }
  .points-cell { text-align:center; font-family:'Bebas Neue', sans-serif; font-size:1.7rem; color:var(--accent); }
  .bar-cell { width:160px; }
  .bar-bg { background:var(--border); border-radius:99px; height:5px; overflow:hidden; }
  .bar-fill { height:100%; border-radius:99px; background:linear-gradient(90deg,#f5c518,#ff9500); transition:width .6s ease; }

  /* ── Per-competition sections ── */
  .comp-sections { display:flex; flex-direction:column; gap:20px; margin-bottom:40px; }
  .comp-section { background:var(--surface); border:1px solid var(--border); border-radius:12px; overflow:hidden; }
  .comp-section-header {
    padding:12px 20px; background:rgba(245,197,24,.06);
    border-bottom:1px solid var(--border);
    font-family:'Bebas Neue', sans-serif; font-size:1.1rem; letter-spacing:2px; color:var(--accent);
  }

  /* ── Legend ── */
  .legend { display:flex; gap:20px; justify-content:center; margin-bottom:40px; flex-wrap:wrap; }
  .legend-item { display:flex; align-items:center; gap:7px; font-size:.8rem; color:var(--muted); }
  .legend-dot { width:8px; height:8px; border-radius:50%; }

  /* ── Footer ── */
  footer {
    border-top:1px solid var(--border);
    padding: 24px 0; text-align:center;
    color:var(--muted); font-size:.78rem; line-height:1.9;
  }
  footer a { color:var(--accent); text-decoration:none; }
  footer a:hover { text-decoration:underline; }
  footer .brand { font-weight:700; color:var(--text); }

  .loading-box { text-align:center; padding:50px; color:var(--muted); }

  @media(max-width:700px){
    .podium-wrap { flex-wrap:wrap; justify-content:center; }
    .podium-card.p1 { order:-1; width:100%; }
    .podium-card.p1 .podium-info { width:100% !important; }
    .podium-info { width:140px !important; }
    .podium-platform { display:none; }
    .bar-cell { display:none; }
    thead th.hide-sm, tbody td.hide-sm { display:none; }
  }
</style>
</head>
<body>

<!-- Sticky topbar with lang toggle -->
<div class="topbar">
  <div class="topbar-school">SMJK CHUNG HWA CONFUCIAN</div>
  <div class="lang-toggle">
    <button class="lang-btn active" id="lang-en" onclick="setLang('en')">EN</button>
    <button class="lang-btn" id="lang-ms" onclick="setLang('ms')">BM</button>
  </div>
</div>

<div class="container">

  <!-- Header -->
  <header>
    <div class="school-name" id="hdr-school">SMJK CHUNG HWA CONFUCIAN</div>
    <h1 id="hdr-title">HARI SUKAN</h1>
    <div class="year-badge">2026</div>
    <div class="updated-strip">
      <div class="updated-dot"></div>
      <span id="updatedLabel">Updated:</span>
      <span id="updatedTime">—</span>
    </div>
  </header>

  <!-- ══ PODIUM ══ -->
  <div class="podium-section">
    <div class="section-label" id="podium-label">RUMAH SUKAN — <span>OVERALL RANKINGS</span></div>
    <div class="podium-wrap" id="podiumWrap">
      <div class="loading-box">Loading rankings…</div>
    </div>
  </div>

  <!-- Filter bar -->
  <div class="filter-section">
    <div class="filter-bar" id="filterBar">
      <button class="filter-btn active" data-comp="all" onclick="filterComp(this,'all')" id="btn-overall">🏆 Overall</button>
    </div>
  </div>

  <!-- Detailed standings table -->
  <div class="standings" id="mainStandings">
    <div class="loading-box">Loading…</div>
  </div>

  <!-- Per-competition breakdown -->
  <div id="compSections" class="comp-sections"></div>

  <!-- Legend -->
  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:#FFD700"></div><span id="leg1">Gold = 5 pts</span></div>
    <div class="legend-item"><div class="legend-dot" style="background:#C0C0C0"></div><span id="leg2">Silver = 3 pts</span></div>
    <div class="legend-item"><div class="legend-dot" style="background:#CD7F32"></div><span id="leg3">Bronze = 1 pt</span></div>
  </div>

</div>

<footer>
  <div class="container">
    Made by <span class="brand">Jayden Tan Zheng Yu</span> · 2A · <a href="mailto:jtyztan12@gmail.com">jtyztan12@gmail.com</a><br>
    IPGC Software · <a href="https://jaydentanofficial.onrender.com" target="_blank">jaydentanofficial.onrender.com</a>
  </div>
</footer>

<script>
// ─── i18n ─────────────────────────────────────────────────────────────
const STR = {
  en: {
    podiumLabel: 'RUMAH SUKAN — <span>OVERALL RANKINGS</span>',
    overall: '🏆 Overall',
    overallStandings: 'OVERALL STANDINGS',
    allComps: 'ALL COMPETITIONS',
    colTeam: 'Team', colPts: 'Points',
    leg1: 'Gold = 5 pts', leg2: 'Silver = 3 pts', leg3: 'Bronze = 1 pt',
    pts: 'PTS',
    places: ['1ST PLACE','2ND PLACE','3RD PLACE','4TH PLACE'],
    updatedLabel: 'Updated:', updatedNever: 'No updates yet',
  },
  ms: {
    podiumLabel: 'RUMAH SUKAN — <span>KEDUDUKAN KESELURUHAN</span>',
    overall: '🏆 Keseluruhan',
    overallStandings: 'KEDUDUKAN KESELURUHAN',
    allComps: 'SEMUA PERTANDINGAN',
    colTeam: 'Pasukan', colPts: 'Mata',
    leg1: 'Emas = 5 mata', leg2: 'Perak = 3 mata', leg3: 'Gangsa = 1 mata',
    pts: 'MATA',
    places: ['TEMPAT KE-1','TEMPAT KE-2','TEMPAT KE-3','TEMPAT KE-4'],
    updatedLabel: 'Dikemaskini:', updatedNever: 'Belum ada kemaskini',
  }
};
let lang = 'en';

function setLang(l) {
  lang = l;
  document.getElementById('lang-en').classList.toggle('active', l==='en');
  document.getElementById('lang-ms').classList.toggle('active', l==='ms');
  const S = STR[l];
  document.getElementById('podium-label').innerHTML = currentComp === 'all'
    ? S.podiumLabel
    : `RUMAH SUKAN — <span>${currentComp.toUpperCase()}</span>`;
  document.getElementById('btn-overall').textContent = S.overall;
  document.getElementById('leg1').textContent = S.leg1;
  document.getElementById('leg2').textContent = S.leg2;
  document.getElementById('leg3').textContent = S.leg3;
  document.getElementById('updatedLabel').textContent = S.updatedLabel;
  renderLastUpdated(lastUpdatedTimestamp);
  if (lastBoardData) { renderPodium(lastBoardData); renderTable(lastBoardData, currentCompLabel); }
}
function t(k) { return STR[lang][k]; }

// ─── Constants ─────────────────────────────────────────────────────────
const TEAM_COLORS = {
  'Rumah Kuning':'#f5c518','Rumah Biru':'#3b82f6',
  'Rumah Merah':'#ef4444','Rumah Hijau':'#22c55e'
};
const MEDAL_ICONS = ['🥇','🥈','🥉','🏅'];
const POS_CLASS   = ['p2','p1','p3','p4']; // visual podium order: 2nd left, 1st centre, 3rd right, 4th far right
const DATA_IDX    = [1,0,2,3];             // which data row each visual slot shows

// ─── State ─────────────────────────────────────────────────────────────
let currentComp = 'all';
let currentCompLabel = null;
let allCompTypes = [];
let lastBoardData = null;
let lastUpdatedTimestamp = null;

// ─── Init ──────────────────────────────────────────────────────────────
async function init() {
  await loadCompTypes();
  const data = await fetchBoard(null);
  lastBoardData = data;
  renderPodium(data);
  renderTable(data, null);
  await renderCompSections();
  await refreshLastUpdated();
}

async function fetchBoard(comp) {
  const url = comp ? `/api/scoreboard?competitionType=${encodeURIComponent(comp)}` : '/api/scoreboard';
  return fetch(url).then(r => r.json());
}

// ─── Last Updated ──────────────────────────────────────────────────────
async function refreshLastUpdated() {
  try {
    const data = await fetch('/api/last-updated').then(r => r.json());
    lastUpdatedTimestamp = data.lastUpdated;
    renderLastUpdated(lastUpdatedTimestamp);
  } catch { /* silent — non-critical display element */ }
}
function renderLastUpdated(iso) {
  const el = document.getElementById('updatedTime');
  if (!iso) { el.textContent = t('updatedNever'); return; }
  const d = new Date(iso);
  el.textContent = d.toLocaleString(lang === 'ms' ? 'ms-MY' : 'en-MY', {
    day: '2-digit', month: 'short', year: 'numeric',
    hour: '2-digit', minute: '2-digit'
  });
}

async function loadCompTypes() {
  allCompTypes = await fetch('/api/competition-types').then(r => r.json());
  const bar = document.getElementById('filterBar');
  bar.innerHTML = `<button class="filter-btn active" data-comp="all" onclick="filterComp(this,'all')" id="btn-overall">${t('overall')}</button>`;
  allCompTypes.forEach(ct => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn';
    btn.dataset.comp = ct.name;
    btn.textContent = ct.name;
    btn.onclick = () => filterComp(btn, ct.name);
    bar.appendChild(btn);
  });
}

async function filterComp(btn, comp) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentComp = comp;
  currentCompLabel = comp === 'all' ? null : comp;

  const data = await fetchBoard(currentCompLabel);
  lastBoardData = data;
  renderPodium(data);
  renderTable(data, currentCompLabel);

  document.getElementById('podium-label').innerHTML = currentCompLabel
    ? `RUMAH SUKAN — <span>${comp.toUpperCase()}</span>`
    : STR[lang].podiumLabel;

  if (comp === 'all') {
    document.getElementById('compSections').style.display = '';
    await renderCompSections();
  } else {
    document.getElementById('compSections').style.display = 'none';
  }
}

// ─── PODIUM ─────────────────────────────────────────────────────────────
function renderPodium(data) {
  const wrap = document.getElementById('podiumWrap');
  if (!data || !data.length) {
    wrap.innerHTML = '<div class="loading-box" style="color:var(--muted)">No data yet — add medals in the admin panel.</div>';
    return;
  }

  const cards = DATA_IDX.map((di, vi) => {
    const row = data[di];
    if (!row) return '';
    const pc = POS_CLASS[vi];
    const placeLabel = STR[lang].places[di];
    const icon = MEDAL_ICONS[di];
    const color = TEAM_COLORS[row.team] || '#aaa';

    return `
      <div class="podium-card ${pc}">
        <div class="podium-rank-badge">${placeLabel}</div>
        <div class="podium-info">
          <span class="podium-medal-icon">${icon}</span>
          <div class="podium-team-dot-big" style="background:${color}"></div>
          <div class="podium-team-name" style="color:${color}">${row.team}</div>
          <div class="podium-points">${row.points}</div>
          <div class="podium-pts-label">${t('pts')}</div>
          <div class="podium-medals-row">
            <div class="podium-medal-count">🥇 ${row.gold}</div>
            <div class="podium-medal-count">🥈 ${row.silver}</div>
            <div class="podium-medal-count">🥉 ${row.bronze}</div>
          </div>
        </div>
        <div class="podium-platform"></div>
      </div>`;
  });

  wrap.innerHTML = cards.join('');
}

// ─── Table ───────────────────────────────────────────────────────────────
function renderTable(data, comp) {
  const container = document.getElementById('mainStandings');
  const maxPts = Math.max(...data.map(d => d.points), 1);
  const title = comp ? comp.toUpperCase() + ' — ' + t('overallStandings') : t('overallStandings');
  const label = comp ? comp.toUpperCase() : t('allComps');

  let html = `
    <div class="standings-header">
      <h2>${title}</h2>
      <span class="comp-label">${label}</span>
    </div>
    <table>
      <thead><tr>
        <th>#</th>
        <th>${t('colTeam')}</th>
        <th class="center">🥇</th>
        <th class="center">🥈</th>
        <th class="center">🥉</th>
        <th class="center">${t('colPts')}</th>
        <th class="hide-sm"></th>
      </tr></thead>
      <tbody>`;

  data.forEach((row, i) => {
    const rc = i===0?'first':i===1?'second':i===2?'third':'';
    const pct = (row.points / maxPts * 100);
    html += `
      <tr>
        <td class="rank ${rc}">${i+1}</td>
        <td><div class="team-name-cell">
          <div class="team-dot" style="background:${TEAM_COLORS[row.team]}"></div>
          <span class="team-name">${row.team}</span>
        </div></td>
        <td class="medal-cell">${row.gold||'—'}</td>
        <td class="medal-cell">${row.silver||'—'}</td>
        <td class="medal-cell">${row.bronze||'—'}</td>
        <td class="points-cell">${row.points}</td>
        <td class="bar-cell hide-sm"><div class="bar-bg"><div class="bar-fill" style="width:${pct}%"></div></div></td>
      </tr>`;
  });

  html += '</tbody></table>';
  container.innerHTML = html;
}

// ─── Per-competition sections ─────────────────────────────────────────
async function renderCompSections() {
  const container = document.getElementById('compSections');
  if (!allCompTypes.length) { container.innerHTML = ''; return; }
  let html = '';
  for (const ct of allCompTypes) {
    const data = await fetchBoard(ct.name);
    html += `<div class="comp-section">
      <div class="comp-section-header">🎯 ${ct.name}</div>
      <table>
        <thead><tr>
          <th>#</th><th>${t('colTeam')}</th>
          <th class="center">🥇</th><th class="center">🥈</th><th class="center">🥉</th>
          <th class="center">${t('colPts')}</th>
        </tr></thead>
        <tbody>`;
    data.forEach((row, i) => {
      if (row.points===0 && row.gold===0) return;
      const rc = i===0?'first':i===1?'second':i===2?'third':'';
      html += `<tr>
        <td class="rank ${rc}" style="font-size:1.1rem">${i+1}</td>
        <td><div class="team-name-cell">
          <div class="team-dot" style="background:${TEAM_COLORS[row.team]}"></div>
          <span class="team-name" style="font-size:.88rem">${row.team}</span>
        </div></td>
        <td class="medal-cell">${row.gold||'—'}</td>
        <td class="medal-cell">${row.silver||'—'}</td>
        <td class="medal-cell">${row.bronze||'—'}</td>
        <td class="points-cell" style="font-size:1.3rem">${row.points}</td>
      </tr>`;
    });
    html += '</tbody></table></div>';
  }
  container.innerHTML = html;
}

init();
setInterval(async () => {
  const data = await fetchBoard(currentCompLabel);
  lastBoardData = data;
  renderPodium(data);
  renderTable(data, currentCompLabel);
  if (currentComp === 'all') renderCompSections();
  await refreshLastUpdated();
}, 30000);
</script>
